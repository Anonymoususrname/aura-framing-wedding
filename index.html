<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eternelle — Wedding &amp; Events</title>
  <meta name="description" content="Eternelle — Luxury wedding and event management. Crafting extraordinary moments that last a lifetime." />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Stylesheets (load order matters) -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- ─────────────────────────────────────────
       CUSTOM CURSOR
  ───────────────────────────────────────── -->
  <div class="cursor"      id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- ─────────────────────────────────────────
       INTRO LOADER
  ───────────────────────────────────────── -->
  <div id="loader">
    <div class="loader-text">Eternelle</div>
    <div class="loader-line"></div>
  </div>

  <!-- ─────────────────────────────────────────
       PAGE-TRANSITION OVERLAY
  ───────────────────────────────────────── -->
  <div id="transition-overlay"></div>

  <!-- ─────────────────────────────────────────
       NAVIGATION
  ───────────────────────────────────────── -->
  <nav id="navbar">
    <a href="#" class="nav-logo" data-page="home">Eternelle</a>

    <ul class="nav-links" id="navLinks">
      <li><a href="#" data-page="home"     class="active">Home</a></li>
      <li><a href="#" data-page="about">About</a></li>
      <li><a href="#" data-page="services">Services</a></li>
      <li><a href="#" data-page="careers">Careers</a></li>
      <li><a href="#" data-page="booking">Book Now</a></li>
      <li><a href="#" data-page="contact">Contact</a></li>
    </ul>

    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <button class="close-nav" id="closeNav" aria-label="Close menu">✕</button>
  </nav>

  <!-- ─────────────────────────────────────────
       PAGES  (each is position:fixed, toggled
       via JS classes: .active / .exit)
  ───────────────────────────────────────── -->

  <!-- HOME -->
  <div class="page active" id="page-home">
    <!-- injected by pages/home.html contents below -->
  </div>

  <!-- ABOUT -->
  <div class="page" id="page-about"></div>

  <!-- SERVICES -->
  <div class="page" id="page-services"></div>

  <!-- CAREERS -->
  <div class="page" id="page-careers"></div>

  <!-- BOOKING -->
  <div class="page" id="page-booking"></div>

  <!-- CONTACT -->
  <div class="page" id="page-contact"></div>

  <!-- ─────────────────────────────────────────
       SCRIPTS
  ───────────────────────────────────────── -->
  <script src="js/cursor.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/router.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
